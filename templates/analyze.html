<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowSense</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css?v=12">
</head>
<body>
    <div class="app">
        <header>
            <a href="/" class="home-link"><h1><svg class="header-logo" width="28" height="28" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="hgrad" x1="30" y1="435" x2="450" y2="130" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00D4FF"/><stop offset="30%" stop-color="#4D8BFF"/><stop offset="60%" stop-color="#7B61FF"/><stop offset="100%" stop-color="#B44AFF"/></linearGradient></defs><path d="M 385 133 Q 399 181, 447 195 Q 399 209, 385 257 Q 371 209, 323 195 Q 371 181, 385 133 Z" fill="url(#hgrad)"/><path d="M 35 435 C 55 435, 85 360, 120 335 C 155 310, 170 395, 205 400 C 240 405, 300 310, 345 240 C 360 215, 375 200, 385 195" stroke="url(#hgrad)" stroke-width="25" stroke-linecap="round" fill="none"/></svg>FlowSense</h1></a>
            <button type="button" id="themeToggle" class="theme-btn">다크</button>
        </header>

        <section class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="종목명 검색" autocomplete="off">
                <button type="button" id="searchBtn" class="search-btn">분석</button>
                <div id="autocomplete" class="autocomplete-dropdown"></div>
            </div>
        </section>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>데이터를 불러오는 중...</p>
        </div>

        <div id="error" class="error-msg hidden"></div>

        <div id="result" class="layout hidden">
            <main class="main-content">

                <div class="stock-header">
                    <div>
                        <h2 id="stockName"></h2>
                        <span id="stockCode" class="meta-tag"></span>
                        <span id="stockMarket" class="meta-tag accent"></span>
                    </div>
                    <div class="price-block" id="priceBlock">
                        <span class="price" id="currentPrice"></span>
                        <span class="change" id="changeRate"></span>
                    </div>
                    <div class="header-actions">
                        <button type="button" id="alertToggleBtn" class="alert-btn">알림 설정</button>
                    </div>
                </div>

                <div id="alertForm" class="alert-form hidden">
                    <input type="number" id="alertTargetInput" class="alert-input" min="1" step="1" placeholder="목표가 입력">
                    <select id="alertDirectionSelect" class="alert-select">
                        <option value="above">이상</option>
                        <option value="below">이하</option>
                    </select>
                    <button type="button" id="alertSetBtn" class="alert-submit-btn">설정</button>
                </div>
                <div id="alertTags" class="alert-tags" aria-live="polite"></div>


                <div class="chart-section">
                    <div class="chart-toolbar">
                        <button type="button" class="period-btn active" data-interval="daily">일봉</button>
                        <button type="button" class="period-btn" data-interval="weekly">주봉</button>
                        <button type="button" class="period-btn" data-interval="monthly">월봉</button>
                    </div>
                    <div id="chartContainer" class="chart-container"></div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="metric-label has-tooltip" data-tooltip="기업의 전체 가치를 나타내요. 주가 × 발행 주식수로 계산합니다.">시가총액 <i class="tip-icon">?</i></span>
                        <span class="metric-value" id="marketCap">-</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label has-tooltip" data-tooltip="주가수익비율. 주가가 1주당 이익의 몇 배인지 나타내요. 낮을수록 저평가일 수 있어요. (보통 10~15배가 적정)">PER <i class="tip-icon">?</i></span>
                        <span class="metric-value" id="perValue">-</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label has-tooltip" data-tooltip="주가순자산비율. 주가가 1주당 순자산의 몇 배인지 나타내요. 1 미만이면 자산 대비 주가가 낮은 거예요.">PBR <i class="tip-icon">?</i></span>
                        <span class="metric-value" id="pbrValue">-</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label has-tooltip" data-tooltip="1년간 받는 배당금이 현재 주가의 몇 %인지 나타내요. 높을수록 투자 대비 현금 수익이 많아요.">배당률 <i class="tip-icon">?</i></span>
                        <span class="metric-value" id="divValue">-</span>
                    </div>
                </div>


                <div class="indicators-grid">
                    <div class="indicator-item">
                        <span class="indicator-label has-tooltip" data-tooltip="5일 이동평균. 최근 5거래일 종가의 평균이에요. 단기 추세를 파악할 때 사용해요.">SMA 5 <i class="tip-icon">?</i></span>
                        <span class="indicator-value" id="sma5">-</span>
                    </div>
                    <div class="indicator-item">
                        <span class="indicator-label has-tooltip" data-tooltip="20일 이동평균. 약 한 달간의 평균 주가예요. 중기 추세를 파악할 때 사용해요.">SMA 20 <i class="tip-icon">?</i></span>
                        <span class="indicator-value" id="sma20">-</span>
                    </div>
                    <div class="indicator-item">
                        <span class="indicator-label has-tooltip" data-tooltip="60일 이동평균. 약 3개월간의 평균 주가예요. 장기 추세를 파악할 때 사용해요.">SMA 60 <i class="tip-icon">?</i></span>
                        <span class="indicator-value" id="sma60">-</span>
                    </div>
                    <div class="indicator-item">
                        <span class="indicator-label has-tooltip" data-tooltip="상대강도지수. 0~100 사이 값으로, 70 이상이면 과매수(비쌀 수 있음), 30 이하면 과매도(쌀 수 있음) 신호예요.">RSI 14 <i class="tip-icon">?</i></span>
                        <span class="indicator-value" id="rsi14">-</span>
                    </div>
                    <div class="indicator-item">
                        <span class="indicator-label has-tooltip" data-tooltip="최근 거래량이 평소 대비 몇 배인지 나타내요. 1보다 크면 평소보다 거래가 활발한 거예요.">거래량 비율 <i class="tip-icon">?</i></span>
                        <span class="indicator-value" id="volRatio">-</span>
                    </div>
                    <div class="indicator-item">
                        <span class="indicator-label has-tooltip" data-tooltip="최근 1년 중 가장 높았던 주가예요. 현재가와 비교하면 고점 대비 얼마나 떨어졌는지 알 수 있어요.">52주 고가 <i class="tip-icon">?</i></span>
                        <span class="indicator-value" id="high52">-</span>
                    </div>
                    <div class="indicator-item">
                        <span class="indicator-label has-tooltip" data-tooltip="최근 1년 중 가장 낮았던 주가예요. 현재가와 비교하면 저점 대비 얼마나 올랐는지 알 수 있어요.">52주 저가 <i class="tip-icon">?</i></span>
                        <span class="indicator-value" id="low52">-</span>
                    </div>
                </div>

                <div class="sources-grid">
                    <div class="source-card">
                        <h3>뉴스</h3>
                        <ul id="newsList"></ul>
                    </div>
                    <div class="source-card">
                        <h3>공시</h3>
                        <ul id="disclosureList"></ul>
                    </div>
                </div>
            </main>

            <aside class="sidebar" id="sidebar">
                <h3 class="sidebar-title">AI 판단</h3>
                <div class="agent-buttons">
                    <button type="button" class="agent-btn" data-agent="buffett">
                        <span class="agent-initial">B</span>
                        <span class="agent-label">Warren Buffett</span>
                    </button>
                    <button type="button" class="agent-btn" data-agent="graham">
                        <span class="agent-initial">G</span>
                        <span class="agent-label">Benjamin Graham</span>
                    </button>
                    <button type="button" class="agent-btn" data-agent="lynch">
                        <span class="agent-initial">L</span>
                        <span class="agent-label">Peter Lynch</span>
                    </button>
                </div>
                <div id="agentResults" class="agent-results"></div>
            </aside>
        </div>

        <footer>
            <p>본 서비스는 참고용이며, 실제 투자 결정은 전문가와 상담하시기 바랍니다.</p>
        </footer>
    </div>

    <div class="chat-fab" id="chatFab">AI</div>
    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <span class="chat-header-title">FlowSense AI</span>
            <button type="button" class="chat-close" id="chatClose">&times;</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="주식에 대해 무엇이든 물어보세요" autocomplete="off">
            <button type="button" class="chat-send-btn" id="chatSend">전송</button>
        </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="/static/script.js?v=9"></script>
    <script src="/static/chat.js?v=2"></script>
</body>
</html>
